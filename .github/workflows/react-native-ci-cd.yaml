name: iPadOS Native Build

on:
  workflow_dispatch:
    inputs:
      release:
        type: choice
        description: "The GitHub Release type for this run"
        options:
          - draft
          - prerelease
          - release

jobs:
  build-ipados:
    runs-on: macos-26

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: 📦 Install JS dependencies
        run: npm install

      - name: ✅ Validate native iOS project exists
        run: |
          if [ ! -d "ios" ]; then
            echo "Missing ./ios directory. This workflow is Expo-free and expects committed native iOS files."
            echo "Generate and commit ios/ first, then rerun."
            exit 1
          fi

      - name: 🍎 Setup Ruby and CocoaPods
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: 📦 Install iOS Pods
        working-directory: ios
        run: |
          pod repo update
          pod install

      - name: 🔧 Build iPadOS IPA (native Xcode)
        env:
          DEVELOPMENT_TEAM: ${{ secrets.IOS_DEVELOPMENT_TEAM }}
          CODE_SIGN_IDENTITY: ${{ secrets.IOS_CODE_SIGN_IDENTITY }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
        run: |
          set -e
          mkdir -p build artifacts

          xcodebuild \
            -workspace ios/Itchy.xcworkspace \
            -scheme Itchy \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Itchy.xcarchive \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_IDENTITY="$CODE_SIGN_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_SPECIFIER" \
            clean archive

          cat > ios/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${DEVELOPMENT_TEAM}</string>
            <key>compileBitcode</key>
            <false/>
            <key>destination</key>
            <string>export</string>
          </dict>
          </plist>
          PLIST

          xcodebuild \
            -exportArchive \
            -archivePath build/Itchy.xcarchive \
            -exportPath artifacts \
            -exportOptionsPlist ios/ExportOptions.plist

      - name: ⬆️ Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-artifact
          path: artifacts/*.ipa

  create-release:
    needs: build-ipados
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 📝 Get version info
        id: build-info
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: ⬇️ Download iOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-artifact
          path: artifacts/ios-artifact

      - name: 📝 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          prerelease: ${{ github.event.inputs.release == 'prerelease' }}
          draft: ${{ github.event.inputs.release == 'draft' }}
          name: "Release v${{ steps.build-info.outputs.version }}-${{ steps.build-info.outputs.build_number }}"
          tag_name: "v${{ steps.build-info.outputs.version }}-${{ steps.build-info.outputs.build_number }}"
          files: |
            artifacts/ios-artifact/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
